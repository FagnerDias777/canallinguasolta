<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Canal Língua Solta</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body {
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 350px;
    }
    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      background: #4f46e5;
      color: white;
      border: none;
      cursor: pointer;
    }
    .erro { color: red; font-size: 13px; }

    img {
        display: block;
        margin: 0 auto;
    }
  </style>
</head>
<body>

<div class="card">
<img src="logo_lingua_solta_sem_fundo_150.png" alt="Canal Lingua Solta">
  <h3>Responda abaixo:</h3>
  <p>Qual o portal de notícias que faz a sua PÁSCOA mais feliz?</p>

  <input id="nome" placeholder="Nome" required>
  <input id="cpf" placeholder="CPF" maxlength="14" required>
  <div id="cpfErro" class="erro"></div>
  <textarea id="resposta" placeholder="Resposta" required></textarea>
  <button id="btnEnviar">Enviar</button>
</div>

<script>
  const supabaseClient = window.supabase.createClient(
    "https://tnbyikuzwcnbkqepjrdo.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRuYnlpa3V6d2NuYmtxZXBqcmRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0ODMzMDUsImV4cCI6MjA5MDA1OTMwNX0.0SD8JNVk-iqovcs0tjbHVzR23uIOqrW42WFMaI36WG4"
  );

  const cpfInput = document.getElementById('cpf');

  // Máscara CPF
  cpfInput.addEventListener('input', () => {
    let v = cpfInput.value.replace(/\D/g, '');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    cpfInput.value = v;
  });

  function validarCPF(cpf) {
    cpf = cpf.replace(/\D/g, '');
    if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

    let soma = 0, resto;
    for (let i = 1; i <= 9; i++)
      soma += parseInt(cpf.substring(i-1, i)) * (11 - i);

    resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;
    if (resto !== parseInt(cpf.substring(9, 10))) return false;

    soma = 0;
    for (let i = 1; i <= 10; i++)
      soma += parseInt(cpf.substring(i-1, i)) * (12 - i);

    resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;

    return resto === parseInt(cpf.substring(10, 11));
  }

  window.enviar = async function() {
    const nome = document.getElementById('nome').value;
    const cpf = cpfInput.value;
    const resposta = document.getElementById('resposta').value;

    if (!validarCPF(cpf)) {
      document.getElementById('cpfErro').innerText = 'CPF inválido';
      return;
    }

    // Bloqueio duplicado
    const { data: existente } = await supabaseClient
      .from('respostas')
      .select('*')
      .eq('cpf', cpf.replace(/\D/g,''));

    if (existente.length > 0) {
      alert('Você já respondeu!');
      return;
    }

    await supabaseClient.from('respostas').insert([
      { nome, cpf: cpf.replace(/\D/g,''), resposta }
    ]);

    document.body.innerHTML = `
  <div style="
    font-family: Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f7fb;
  ">
    <div style="
      background:white;
      padding:30px;
      border-radius:12px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
      text-align:center;
    ">
      <h2>✅ Obrigado!</h2>
      <p>Sua resposta foi enviada com sucesso.</p>
    </div>
  </div>
`;

  }
  document.getElementById('btnEnviar').addEventListener('click', enviar);
</script>

</body>
</html>
